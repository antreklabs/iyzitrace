services:
  grafana:
    user: root
    container_name: 'iyzitrace-app'

    build:
      context: .
      args:
        grafana_image: grafana
        grafana_version: 12.2.0
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - ../dist:/var/lib/grafana/plugins/iyzitrace-app
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/iyzitrace-app
      - grafana-data:/var/lib/grafana

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.iyzitrace-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: iyzitrace-app
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: true
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor