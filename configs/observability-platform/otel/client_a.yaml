extensions:
  opamp:
    server:
      ws:
        endpoint: wss://127.0.0.1:4320/v1/opamp
        tls:
          insecure_skip_verify: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  otlp/nginx:
    endpoint: nginx-platform:4317
    tls:
      insecure: true

processors:
  batch: {}

service:
  extensions: [opamp]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/nginx]

  telemetry:
    resource:
     service.name: otelcol-collector-01
    logs:
      encoding: console
      error_output_paths:
          - stderr
      level: info
      output_paths:
          - stderr
      sampling:
          enabled: true
          initial: 10
          thereafter: 100
          tick: 10s
    metrics:
      level: Normal
      readers:
          - pull:
              exporter:
                  prometheus:
                      host: localhost
                      port: 8888
                      with_resource_constant_labels:
                          included: []
                      without_type_suffix: true
                      without_units: true

