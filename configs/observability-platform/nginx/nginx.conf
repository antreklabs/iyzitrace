worker_processes auto;
events { worker_connections 2048; }

http {
  client_max_body_size 100m;
  keepalive_timeout 75s;

  # OTLP/HTTP upstreams
  upstream log_otel_http   { server log-otel-enrichment:4318; keepalive 64; }
  upstream metric_otel_http{ server metric-otel-enrichment:4318; keepalive 64; }
  upstream trace_otel_http { server trace-otel-enrichment:4318; keepalive 64; }

  # HTTP ingress (80)
  server {
    listen 0.0.0.0:80;

    proxy_read_timeout 90s;
    proxy_send_timeout 90s;

    location = /v1/logs    { proxy_http_version 1.1; proxy_pass http://log_otel_http; }
    location = /v1/metrics { proxy_http_version 1.1; proxy_pass http://metric_otel_http; }
    location = /v1/traces  { proxy_http_version 1.1; proxy_pass http://trace_otel_http; }

    location / { return 404; }
  }

  # HTTPS ingress (443)
  server {
    listen 0.0.0.0:443 ssl http2;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    proxy_read_timeout 90s;
    proxy_send_timeout 90s;

    location = /v1/logs    { proxy_http_version 1.1; proxy_pass http://log_otel_http; }
    location = /v1/metrics { proxy_http_version 1.1; proxy_pass http://metric_otel_http; }
    location = /v1/traces  { proxy_http_version 1.1; proxy_pass http://trace_otel_http; }

    location / { return 404; }
  }
}
