worker_processes auto;
events { worker_connections 2048; }

http {
  client_max_body_size 100m;
  keepalive_timeout 75s;

  # OTLP/HTTP upstreams
  upstream log_otel_http   { server log-otel-enrichment:4318; keepalive 64; }
  upstream metric_otel_http{ server metric-otel-enrichment:4318; keepalive 64; }
  upstream trace_otel_http { server trace-otel-enrichment:4318; keepalive 64; }

  # OTLP/gRPC upstreams
  upstream log_otel_grpc   { server log-otel-enrichment:4317; keepalive 64; }
  upstream metric_otel_grpc{ server metric-otel-enrichment:4317; keepalive 64; }
  upstream trace_otel_grpc { server trace-otel-enrichment:4317; keepalive 64; }

  # gRPC ingress (4317)
  server {
    listen 0.0.0.0:4317 http2;

    grpc_read_timeout 90s;
    grpc_send_timeout 90s;

    # route by gRPC method
    location = /opentelemetry.proto.collector.logs.v1.LogsService/Export    { grpc_pass grpc://log_otel_grpc; }
    location = /opentelemetry.proto.collector.metrics.v1.MetricsService/Export { grpc_pass grpc://metric_otel_grpc; }
    location = /opentelemetry.proto.collector.trace.v1.TraceService/Export  { grpc_pass grpc://trace_otel_grpc; }

    location / { return 404; }
  }

  # HTTP ingress (4318)
  server {
    listen 0.0.0.0:4318;

    proxy_read_timeout 90s;
    proxy_send_timeout 90s;

    location = /v1/logs    { proxy_http_version 1.1; proxy_pass http://log_otel_http; }
    location = /v1/metrics { proxy_http_version 1.1; proxy_pass http://metric_otel_http; }
    location = /v1/traces  { proxy_http_version 1.1; proxy_pass http://trace_otel_http; }

    location / { return 404; }
  }
}
