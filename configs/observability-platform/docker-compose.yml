name: observability-platform

services:
  ########################
  # Backing data stores  #
  ########################

  tempo:
    container_name: tempo-platform
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200" # Tempo HTTP (changed from 3200 to avoid conflict)
      - "4317"   # OTLP gRPC (changed from 4317 to avoid conflict)

  loki:
    container_name: loki-platform
    image: grafana/loki:latest
    command: [ "-config.file=/etc/loki/config.yml" ]
    volumes:
      - ./loki/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100" # Changed from 3100 to avoid conflict

  prometheus:
    container_name: prometheus-platform
    image: quay.io/prometheus/prometheus:v3.5.0
    command:
      - --web.console.templates=/etc/prometheus/consoles
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --storage.tsdb.retention.time=1h
      - --config.file=/etc/prometheus/prometheus-config.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --web.enable-otlp-receiver
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus-config.yaml
      - ./prometheus/rules:/etc/prometheus/rules
    ports:
      - "9090" # Changed from 9090 to avoid conflict

  ########################
  # Server collectors    #
  ########################

  trace-otel-enrichment: # traces -> Tempo
    container_name: trace-otel-enrichment
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./otel/trace-otel-enrichment.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317"
      - "4318"
    depends_on: [ tempo ]

  metric-otel-enrichment: # metrics -> Prometheus (prometheus exporter, scraped by Prometheus)
    container_name: metric-otel-enrichment
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./otel/metric-otel-enrichment.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317"
      - "4318"
      - "14317"
    depends_on: [ prometheus ]

  log-otel-enrichment: # logs -> Loki
    container_name: log-otel-enrichment
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./otel/log-otel-enrichment.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317"
      - "4318"
    depends_on: [ loki ]

  ########################
  # NGINX signal router  #
  ########################

  nginx:
    container_name: nginx-platform
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80" # OTLP/HTTP ingress
      - "443:443" # OTLP/HTTPS ingress
    depends_on: [ trace-otel-enrichment, metric-otel-enrichment, log-otel-enrichment ]

networks:
  default:
    name: shared-network
    external: true

volumes:
  tempo-data: {}
  loki-data: {}
  prom-data: {}
