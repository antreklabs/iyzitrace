stream_over_http_enabled: true
server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

query_frontend:
  # Keep search and trace query SLAs predictable
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
    metadata_slo:
      duration_slo: 5s
      throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  # Flush larger blocks less often for better compression and fewer compactions
  max_block_bytes: 5242880     # 5 MiB target block size
  max_block_duration: 15m      # cap block duration
  trace_idle_period: 30s       # flush idle traces sooner to avoid stragglers

compactor:
  compaction:
    # Retain traces for 7d by default; tune per environment/SLO
    block_retention: 168h

storage:
  trace:
    backend: local # swap to object storage (s3/gcs/azure) for real HA deployments
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    block:
      bloom_filter_false_positive: 0.01
    pool:
      max_workers: 50
      queue_depth: 20000
