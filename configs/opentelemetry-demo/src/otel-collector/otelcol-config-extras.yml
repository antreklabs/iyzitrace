# extra settings to be merged into OpenTelemetry Collector configuration
# do not delete this file

exporters:
  # Tempo exporter for traces
  otlphttp/tempo:
    endpoint: "http://tempo:4318"
    tls:
      insecure: true
  
  # Loki exporter for logs via OTLP
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    # tls:
    #   insecure: true

  otlp:
    endpoint: "https://ingest.us.signoz.cloud:443"
    tls:
      insecure: false
    headers:
      signoz-ingestion-key: 28da4fd2-539f-4a45-a282-15cecdb5643e
  debug:
    verbosity: detailed

  otlphttp/dash0:
    endpoint: https://ingress.europe-west4.gcp.dash0.com
    headers:
      Authorization: Bearer auth_T2zx9Nu7ohOMTe6YEoT0yhivKvnzdANJ
      Dash0-Dataset: default


    
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, transform, batch, transform/type_classifier]
      exporters: [otlp, otlphttp/tempo, debug, spanmetrics, servicegraph, otlphttp/dash0]
    metrics:
      receivers: [docker_stats, httpcheck/frontend-proxy, hostmetrics, nginx, otlp, postgresql, redis, spanmetrics, servicegraph]
      processors: [resourcedetection, memory_limiter, batch, metricstransform]
      exporters: [otlp, otlphttp/prometheus, debug, otlphttp/dash0]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, transform, batch]
      exporters: [otlp, opensearch, otlphttp/loki, debug, otlphttp/dash0]

processors:
  # var olan memory_limiter / batch varsa kalsın; aşağıdaki yeni blokları ekliyoruz/override ediyoruz
  batch:
  transform/type_classifier:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["type"], "http")
            where (
              attributes["http.request.method"] != nil or
              attributes["http.method"] != nil or
              attributes["url.full"] != nil or
              attributes["server.address"] != nil
            ) and attributes["type"] == nil
          - set(attributes["type"], "messaging")
            where (
              attributes["messaging.system"] != nil or
              attributes["messaging.destination.name"] != nil
            ) and attributes["type"] == nil
          - set(attributes["type"], "cache")
            where (
              attributes["db.system"] != nil and attributes["db.system"] == "redis"
            ) and attributes["type"] == nil
          - set(attributes["type"], "database")
            where (
              attributes["db.system"] != nil or
              attributes["db.namespace"] != nil or
              attributes["db.operation.name"] != nil or
              attributes["db.operation"] != nil
            ) and attributes["type"] == nil
          - set(attributes["type"], "rpc")
            where (
              attributes["rpc.system"] != nil or
              attributes["rpc.service"] != nil or
              attributes["rpc.method"] != nil
            ) and attributes["type"] == nil

  metricstransform:
    transforms:
      - include: ^traces_service_graph(.*)$
        match_type: regexp
        action: update
        new_name: iyzitrace_service_graph$$1
      - include: ^traces\.span\.metrics\.(.*)$
        match_type: regexp
        action: update
        new_name: iyzitrace.span.metrics.$$1

  transform:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # Base'teki 2 kuralı koruyoruz ve 1 kural ekliyoruz
          - replace_pattern(name, "\\?.*", "")
          - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")
          - set(span.attributes["operation.name"], span.name)
    log_statements:
      - context: log
        statements:
          # Level'ı resource attributes'a ekle
          - set(resource.attributes["level"], "INFO")
          # Test için basit bir attribute ekle
          - set(attributes["test_attr"], "working")
          # Service name'i resource'dan al
          - set(resource.attributes["service_name"], resource.attributes["service.name"])
          # Service namespace'i resource'dan al
          - set(resource.attributes["service_namespace"], resource.attributes["service.namespace"])

connectors:
  spanmetrics:
    dimensions:
      - name: type

  servicegraph:
    metrics_flush_interval: 30s
    dimensions:
      - db.system
      - db.name
      - operation.name
    virtual_node_peer_attributes:
      - db.system
      - peer.service
    virtual_node_extra_label: true
