receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  httpcheck/frontend-proxy:
    targets:
      - endpoint: http://${env:FRONTEND_PROXY_ADDR}
  nginx:
    endpoint: http://${env:IMAGE_PROVIDER_HOST}:${env:IMAGE_PROVIDER_PORT}/status
    collection_interval: 10s
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    api_version: "1.42"
  postgresql:
    collection_interval: 10s
    endpoint: ${POSTGRES_HOST}:${POSTGRES_PORT}
    username: root
    password: ${POSTGRES_PASSWORD}
    metrics:
      postgresql.blks_hit:
        enabled: true
      postgresql.blks_read:
        enabled: true
      postgresql.tup_fetched:
        enabled: true
      postgresql.tup_returned:
        enabled: true
      postgresql.tup_inserted:
        enabled: true
      postgresql.tup_updated:
        enabled: true
      postgresql.tup_deleted:
        enabled: true
      postgresql.deadlocks:
        enabled: true
    tls:
      insecure: true
  redis:
    endpoint: "valkey-cart:6379"
    username: "valkey"
    collection_interval: 10s
  # Host metrics
  hostmetrics:
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk:
      load:
      filesystem:
        metrics:
          system.filesystem.usage:
            enabled: true
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/k3s/containerd/*
            - /var/lib/docker/*
            - /var/lib/kubelet/*
            - /snap/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - fusectl
            - hugetlbfs
            - iso9660
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs
          match_type: strict
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
          system.memory.limit:
            enabled: true
      network:
      paging:
        metrics:
          system.paging.usage:
            enabled: true
      processes:
      process:
        include:
          match_type: regexp
          names:
            # -------- Always-present system processes (ensure host appears)
            - "(?i)^systemd$"
            - "(?i)^init$"

            # -------- OpenTelemetry Collector processes (core + contrib)
            - "(?i).*otelcol.*"
            - "(?i).*otelcol-contrib.*"
            
            # runtimes
            - "(?i).*java.*"
            - "(?i).*dotnet.*"
            - "(?i).*python.*"
            - "(?i).*node.*"
            - "(?i).*ruby.*"
            - "(?i).*php.*"
            - "(?i).*go.*"

            # databases
            - "(?i).*postgres.*"
            - "(?i).*mysql.*"
            - "(?i).*mariadb.*"
            - "(?i).*oracle.*"
            - "(?i).*sqlserver.*"

            # messaging
            - "(?i).*kafka.*"
            - "(?i).*rabbitmq.*"

            # cache
            - "(?i).*redis.*"
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true
        metrics:
          process.cpu.utilization:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.uptime:
            enabled: true
      system:
processors:
  batch:
    timeout: 10s
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  resourcedetection:
    detectors: [env, docker, system]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.arch:
          enabled: true
        host.name:
          enabled: true
        host.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.name:
          enabled: true
        os.type:
          enabled: true
        os.description:
          enabled: true
        os.version:
          enabled: true
        os.build.id:
          enabled: false
          
  transform/span:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # Base'teki 2 kuralı koruyoruz ve 1 kural ekliyoruz
          - replace_pattern(name, "\\?.*", "")
          - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")

exporters:
  debug:
    verbosity: detailed
# OTLP exporter (observability platform)
  otlphttp/iyzitrace:
    endpoint: "http://nginx-platform:80"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, batch, transform/span]
      exporters: [otlphttp/iyzitrace]
    metrics:
      receivers: [otlp, docker_stats, httpcheck/frontend-proxy, hostmetrics, nginx, postgresql, redis]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [otlphttp/iyzitrace]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [otlphttp/iyzitrace]
  telemetry:
    resource:
      service.name: "central-collector"
      service.namespace: "opentelemetry-demo"
    metrics:
      level: detailed
      readers:
        - periodic:
            interval: 10000
            timeout: 5000
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
