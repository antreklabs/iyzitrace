name: observability-platform

services:
  ########################
  # Backing data stores  #
  ########################

  tempo:
    container_name: tempo
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./configs/observability-platform/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200" # Tempo HTTP (optional to expose)
      - "14268:14268" # Jaeger ingest (not used here)
      - "4317"   # OTLP gRPC (optional to expose)
      - "4318"   # OTLP HTTP (optional to expose)
    networks: [ otel ]

  loki:
    container_name: loki
    image: grafana/loki:latest
    command: [ "-config.file=/etc/loki/config.yml" ]
    volumes:
      - ./configs/observability-platform/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks: [ otel ]

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./configs/observability-platform/prometheus/prometheus.yml:/etc/prometheus.yaml
    ports:
      - "9090:9090"
    networks: [ otel ]

  ########################
  # Server collectors    #
  ########################

  server_a: # traces -> Tempo
    container_name: server_a
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./configs/observability-platform/otel/server_a.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "14317:4317" # optional, for debugging
      - "14318:4318"
    networks: [ otel ]
    depends_on: [ tempo ]

  server_b: # metrics -> Prometheus (prometheus exporter, scraped by Prometheus)
    container_name: server_b
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./configs/observability-platform/otel/server_b.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "18889:8889" # expose server_b's /metrics for quick manual checks
      - "24317:4317"
      - "24318:4318"
    networks: [ otel ]
    depends_on: [ prometheus ]

  server_c: # logs -> Loki
    container_name: server_c
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./configs/observability-platform/otel/server_c.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "34317:4317"
      - "34318:4318"
    networks: [ otel ]
    depends_on: [ loki ]

  ########################
  # NGINX signal router  #
  ########################

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    volumes:
      - ./configs/observability-platform/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "4317:4317" # gRPC ingress
      - "4318:4318" # HTTP ingress
    networks: [ otel ]
    depends_on: [ server_a, server_b, server_c ]

  ########################
  # Client collectors    #
  ########################

  client_a: # traces only -> NGINX
    container_name: client_a
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./configs/observability-platform/otel/client_a.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "5317:4317" # to receive from telemetrygen_traces
    networks: [ otel ]
    depends_on: [ nginx ]

  client_b: # metrics only -> NGINX
    container_name: client_b
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./configs/observability-platform/otel/client_b.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "6317:4317" # to receive from telemetrygen_metrics
    networks: [ otel ]
    depends_on: [ nginx ]

  client_c: # logs only -> NGINX
    container_name: client_c
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./configs/observability-platform/otel/client_c.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "7317:4317" # to receive from telemetrygen_logs
    networks: [ otel ]
    depends_on: [ nginx ]

  ########################
  # Telemetry generators #
  ########################

  telemetrygen_traces:
    container_name: telemetrygen_traces
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command: ["traces", "--otlp-endpoint=client_a:4317", "--otlp-insecure", "--duration=inf", "--service=demo-traces"]
    networks: [ otel ]
    depends_on: [ client_a ]

  telemetrygen_metrics:
    container_name: telemetrygen_metrics
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command: ["metrics", "--otlp-endpoint=client_b:4317", "--otlp-insecure", "--duration=inf", "--service=demo-metrics"]
    networks: [ otel ]
    depends_on: [ client_b ]

  telemetrygen_logs:
    container_name: telemetrygen_logs
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command: ["logs", "--otlp-endpoint=client_c:4317", "--otlp-insecure", "--duration=inf", "--service=demo-logs"]
    networks: [ otel ]
    depends_on: [ client_c ]

networks:
  otel: {}

volumes:
  tempo-data: {}
  loki-data: {}
  prom-data: {}
