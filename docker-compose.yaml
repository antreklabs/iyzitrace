services:
  grafana:
    image: yahyaozturk/iyzitrace  # Based on Grafana 11.5.2
    volumes:
      - ./dist:/var/lib/grafana/plugins/iyzitrace-app
      - ./provisioning:/etc/grafana/provisioning
    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.iyzitrace-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: iyzitrace-app
    ports:
      - "3000:3000"

  init:
    image: &tempoImage grafana/tempo
    user: root
    entrypoint:
      - "chown"
      - "10001:10001"
      - "/var/tempo"
    volumes:
      - ./tempo-data:/var/tempo

  tempo:
    image: *tempoImage
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./shared/tempo.yaml:/etc/tempo.yaml
      - ./tempo-data:/var/tempo
    ports:
      - "3200" # tempo
      - "4317" # otlp grpc
    depends_on:
      - init

  # Generate fake traces...
  k6-tracing:
    image: ghcr.io/grafana/xk6-client-tracing:v0.0.5
    environment:
      - ENDPOINT=otel-collector:4317
    restart: always
    depends_on:
      - otel-collector

  # And put them in an OTEL collector pipeline...
  otel-collector:
    image: otel/opentelemetry-collector:0.86.0
    command: [ "--config=/etc/otel-collector.yaml" ]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml

  prometheus:
    image: prom/prometheus:v2.54.1  # Pinned version
    command:
      - --config.file=/etc/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./shared/prometheus.yaml:/etc/prometheus.yaml
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.3.0  # Pinned version
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./shared/loki.yaml:/etc/loki/local-config.yaml
      - ./loki-data:/loki
    ports:
      - "3100:3100"

  cors-proxy:
    build:
      context: .
      dockerfile: Dockerfile.cors-proxy
    ports:
      - "3101:3101"
    depends_on:
      - loki
