networks:
  default:
    name: iyzitrace-network
  observability-platform_otel:
    external: true

services:
  grafana:
    image: yahyaozturk/iyzitrace
    container_name: iyzitrace-grafana
    volumes:
      - ./dist:/var/lib/grafana/plugins/iyzitrace-app
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - NODE_ENV=development
      - GF_LOG_FILTERS=plugin.iyzitrace-app:debug
      - GF_LOG_LEVEL=debug
      - GF_DATAPROXY_LOGGING=1
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=iyzitrace-app
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    ports:
      - "3000:3000"
    networks:
      - default
      - observability-platform_otel